<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Jerry Wang</title>
  <meta name="description" content="Projects by Jerry Wang, software and AI engineer.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #181818;
      --bg-soft: #1F1F1F;
      --card: #FFFFFF;
      --ink: #161616;
      --white: #F5F5F3;
      --ghost: #3A3A3A;
      --gray: #9C9C9C;
      --gray-dark: #6E6E6E;
      --orange: #E4602F;
      --lime: #D9F855;
      --line: #2C2C2C;
      --ease: cubic-bezier(.22, .61, .21, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    ::selection {
      background: var(--orange);
      color: #fff
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      color: inherit
    }

    a:focus-visible {
      outline: 2px solid var(--orange);
      outline-offset: 3px
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity .8s var(--ease), transform .8s var(--ease)
    }

    .reveal.in {
      opacity: 1;
      transform: none
    }

    .stagger>* {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity .7s var(--ease), transform .7s var(--ease)
    }

    .stagger.in>* {
      opacity: 1;
      transform: none
    }

    .stagger.in>*:nth-child(1) {
      transition-delay: .06s
    }

    .stagger.in>*:nth-child(2) {
      transition-delay: .14s
    }

    .stagger.in>*:nth-child(3) {
      transition-delay: .22s
    }

    .nav {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(34, 34, 34, .85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 18px;
      display: flex;
      gap: 8px;
    }

    .nav a {
      width: 44px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: var(--gray);
      transition: color .25s var(--ease), background .25s var(--ease);
    }

    .nav a:hover {
      color: #fff;
      background: rgba(255, 255, 255, .08)
    }

    .nav a[aria-current] {
      color: var(--orange)
    }

    .nav svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 170px 40px 0;
      width: 100%;
      flex: 1
    }

    .giant {
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -.02em;
      font-size: clamp(56px, 7.2vw, 112px);
      line-height: .98;
    }

    .giant .dim {
      display: block;
      color: var(--ghost)
    }

    .lede {
      color: var(--gray);
      max-width: 52ch;
      font-size: 17px;
      margin-top: 34px
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
      margin-top: 70px
    }

    .slot {
      border: 1.5px dashed var(--line);
      border-radius: 20px;
      min-height: 250px;
      display: grid;
      place-items: center;
      color: var(--gray-dark);
      font-size: 13px;
      letter-spacing: .18em;
      font-weight: 600;
      transition: border-color .35s var(--ease), color .35s var(--ease), transform .35s var(--ease);
    }

    .slot:hover {
      border-color: var(--orange);
      color: var(--gray);
      transform: translateY(-4px)
    }

    .ghbtn {
      display: inline-block;
      margin-top: 56px;
      background: var(--orange);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 16px 34px;
      border-radius: 12px;
      transition: transform .3s var(--ease), background .3s var(--ease);
    }

    .ghbtn:hover {
      background: #EF6E3C;
      transform: translateY(-2px)
    }

    .footer {
      max-width: 1100px;
      margin: 110px auto 0;
      width: 100%;
      padding: 34px 40px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--gray-dark);
      font-size: 14px;
    }

    @media (max-width:900px) {
      .grid {
        grid-template-columns: 1fr
      }

      main {
        padding: 150px 20px 0
      }

      .footer {
        padding: 34px 20px
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto
      }

      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important
      }

      .reveal,
      .stagger>* {
        opacity: 1 !important;
        transform: none !important
      }
    }
  </style>
</head>

<body>

  <nav class="nav" aria-label="Main">
    <a href="index.html" title="Home" aria-label="Home"><svg viewBox="0 0 24 24">
        <path d="M3 11.5 12 4l9 7.5" />
        <path d="M5.5 10.5V20h13v-9.5" />
      </svg></a>
    <a href="index.html#experience" title="Experience" aria-label="Experience"><svg viewBox="0 0 24 24">
        <rect x="3.5" y="7.5" width="17" height="12" rx="2" />
        <path d="M9 7.5V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1.5" />
      </svg></a>
    <a href="projects.html" title="Projects" aria-current="page" aria-label="Projects"><svg viewBox="0 0 24 24">
        <path d="M3.5 7a2 2 0 0 1 2-2h4l2 2.5h7a2 2 0 0 1 2 2V17a2 2 0 0 1-2 2h-13a2 2 0 0 1-2-2z" />
      </svg></a>
    <a href="index.html#contact" title="Contact" aria-label="Contact"><svg viewBox="0 0 24 24">
        <rect x="3.5" y="5.5" width="17" height="13" rx="2" />
        <path d="m4.5 7 7.5 6 7.5-6" />
      </svg></a>
  </nav>

  <main>
    <h1 class="giant reveal">All<span class="dim">Projects</span></h1>
    <p class="lede reveal">Detailed write-ups are on the way. In the meantime, the code lives on GitHub.</p>

    <div class="grid stagger">
      <div class="slot">COMING SOON</div>
      <div class="slot">COMING SOON</div>
      <div class="slot">COMING SOON</div>
    </div>

    <a class="ghbtn reveal" href="https://github.com/JerryW04">Browse GitHub →</a>
  </main>

  <div class="footer">
    <span>© 2026 Jerry Wang</span>
    <span>Ann Arbor, MI</span>
  </div>

  <script>
    (function () {
      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var targets = document.querySelectorAll('.reveal,.stagger');
      if (reduced || !('IntersectionObserver' in window)) {
        targets.forEach(function (el) { el.classList.add('in') });
      } else {
        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target) }
          });
        }, { threshold: .12, rootMargin: '0px 0px -6% 0px' });
        targets.forEach(function (el) { io.observe(el) });
      }
    })();
  </script>
</body>

</html>
