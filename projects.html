<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Jerry Wang</title>
<meta name="description" content="Projects by Jerry Wang, software and AI engineer.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F4F1;
  --ink:#151513;
  --gray:#6E6E68;
  --faint:#A6A6A0;
  --hairline:#E1E1DC;
  --card:#FDFDFB;
  --ease:cubic-bezier(.22,.61,.21,1);
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--ink);color:var(--bg)}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Schibsted Grotesk',sans-serif;
  font-size:17px;line-height:1.65;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;flex-direction:column;
}
.mono{font-family:'IBM Plex Mono',monospace}
a{color:inherit}
a:focus-visible{outline:2px solid var(--ink);outline-offset:4px}

.reveal{opacity:0;transform:translateY(26px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.reveal.in{opacity:1;transform:none}
.stagger>*{opacity:0;transform:translateY(22px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.stagger.in>*{opacity:1;transform:none}
.stagger.in>*:nth-child(1){transition-delay:.05s}
.stagger.in>*:nth-child(2){transition-delay:.13s}
.stagger.in>*:nth-child(3){transition-delay:.21s}

nav{
  position:sticky;top:0;z-index:50;
  background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--hairline);
}
.navin{max-width:1020px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.14em;text-decoration:none;font-weight:500}
.navlinks{display:flex;gap:26px}
.navlinks a{
  font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.1em;color:var(--gray);
  text-decoration:none;position:relative;padding-bottom:3px;transition:color .25s var(--ease);
}
.navlinks a::after{
  content:'';position:absolute;left:0;bottom:0;height:1px;width:100%;background:var(--ink);
  transform:scaleX(0);transform-origin:right;transition:transform .35s var(--ease);
}
.navlinks a:hover{color:var(--ink)}
.navlinks a:hover::after{transform:scaleX(1);transform-origin:left}
.navlinks a[aria-current]{color:var(--ink)}
.navlinks a[aria-current]::after{transform:scaleX(1)}

main{max-width:1020px;margin:0 auto;padding:96px 24px 0;width:100%;flex:1}
.kicker{
  font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;color:var(--gray);
  display:flex;align-items:center;gap:14px;margin-bottom:18px;
}
.kicker::after{content:'';height:1px;flex:1;background:var(--hairline)}
h1{font-weight:750;font-size:clamp(34px,5vw,52px);letter-spacing:-.025em;margin-bottom:14px}
.lede{color:var(--gray);max-width:54ch;margin-bottom:56px}

.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px}
.slot{
  border:1px dashed var(--hairline);min-height:230px;border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--faint);
  transition:border-color .35s var(--ease),color .35s var(--ease);
}
.slot:hover{border-color:var(--faint);color:var(--gray)}

.ghbtn{
  font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.05em;text-decoration:none;
  padding:12px 22px;border:1px solid var(--ink);display:inline-block;margin-top:48px;
  position:relative;overflow:hidden;z-index:1;transition:color .3s var(--ease);
}
.ghbtn::before{
  content:'';position:absolute;inset:0;background:var(--ink);z-index:-1;
  transform:translateY(101%);transition:transform .35s var(--ease);
}
.ghbtn:hover{color:var(--bg)}
.ghbtn:hover::before{transform:translateY(0)}

footer{margin-top:110px;border-top:1px solid var(--hairline)}
.footline{
  max-width:1020px;margin:0 auto;padding:22px 24px 40px;
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:var(--faint);
}

@media (max-width:820px){
  .grid{grid-template-columns:1fr}
  .navlinks{gap:16px}
  main{padding-top:72px}
}
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation:none!important;transition:none!important}
  .reveal,.stagger>*{opacity:1!important;transform:none!important}
}
</style>
</head>
<body>

<nav>
  <div class="navin">
    <a class="logo" href="index.html">JERRY WANG</a>
    <div class="navlinks">
      <a href="index.html#experience">EXPERIENCE</a>
      <a href="index.html#work">WORK</a>
      <a href="projects.html" aria-current="page">PROJECTS</a>
      <a href="index.html#contact">CONTACT</a>
    </div>
  </div>
</nav>

<main>
  <div class="kicker reveal">PROJECTS</div>
  <h1 class="reveal">Projects</h1>
  <p class="lede reveal">Detailed write-ups are on the way. In the meantime, the code lives on GitHub.</p>

  <div class="grid stagger">
    <div class="slot">COMING SOON</div>
    <div class="slot">COMING SOON</div>
    <div class="slot">COMING SOON</div>
  </div>

  <a class="ghbtn reveal" href="https://github.com/JerryW04">Browse GitHub →</a>
</main>

<footer>
  <div class="footline">
    <span>© 2026 JERRY WANG</span>
    <span>ANN ARBOR, MI</span>
  </div>
</footer>

<script>
(function(){
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var targets = document.querySelectorAll('.reveal,.stagger');
  if(reduced || !('IntersectionObserver' in window)){
    targets.forEach(function(el){el.classList.add('in')});
  }else{
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}
      });
    },{threshold:.12,rootMargin:'0px 0px -6% 0px'});
    targets.forEach(function(el){io.observe(el)});
  }
})();
</script>
</body>
</html>
